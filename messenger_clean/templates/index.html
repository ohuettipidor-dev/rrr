<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Messenger">
    <meta name="theme-color" content="#2ea6ff">
    <title>Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-card {
            background: #17212b;
            border-radius: 20px;
            padding: 48px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 12px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #2ea6ff;
            color: white;
        }
        .btn-primary:hover {
            background: #1e8ae6;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #2ea6ff;
            border: 1px solid #2ea6ff;
        }
        .btn-secondary:hover {
            background: rgba(46,166,255,0.1);
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="logo">💬</div>
        <h1>Мессенджер</h1>
        <p>Общайтесь с друзьями в реальном времени как в Telegram</p>
        <div class="buttons">
            <a href="/login" class="btn btn-primary">Войти</a>
            <a href="/register" class="btn btn-secondary">Регистрация</a>
        </div>
    </div>
</body>
</html>
