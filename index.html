<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Агент — Браузерный</title>
    <style>
        body { font-family: Arial; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
        #output { background: #13131c; border-radius: 10px; padding: 20px; min-height: 200px; white-space: pre-wrap; }
        input { width: 100%; padding: 10px; margin-top: 10px; background: #1a1a2a; border: none; color: #fff; }
        button { padding: 10px 20px; margin-top: 10px; background: #ff4d6a; border: none; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ИИ Агент (Браузерный)</h1>
    <div id="output"></div>
    <input id="prompt" type="text" placeholder="Введи задачу...">
    <button onclick="run()">Выполнить</button>

    <script>
        const LLM_URL = "https://text.pollinations.ai/openai";

        // Системный промпт для агента
        const SYSTEM_PROMPT = `Ты — автономный ИИ-агент. Твоя задача — отвечать на запросы пользователя, используя доступные тебе инструменты. Ты можешь использовать следующие функции:

1. search_wikipedia(query) — найти информацию по запросу в Википедии.
2. run_code(code) — выполнить JavaScript-код и вернуть результат.
3. write_file(filename, content) — записать файл в репозиторий GitHub.

Если ты хочешь использовать инструмент, напиши в ответе ТОЛЬКО валидный JSON вида:
{"action": "tool", "tool": "имя_инструмента", "args": {"arg1": "value1", ...}}

Если у тебя готов финальный ответ, напиши JSON вида:
{"action": "final", "answer": "Твой ответ пользователю"}

Не пиши ничего, кроме этого JSON.`;

        // Инструмент 1: Поиск в Википедии
        async function search_wikipedia(query) {
            try {
                const r = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const d = await r.json();
                return d.extract || "Ничего не найдено.";
            } catch (e) { return "Ошибка поиска."; }
        }

        // Инструмент 2: Выполнение JavaScript
        async function run_code(code) {
            try { return String(eval(code)); } catch (e) { return "Ошибка: " + e.message; }
        }

        // Инструмент 3: Запись файла в GitHub
        async function write_file(filename, content) {
            let token = sessionStorage.getItem('gh_token');
            if (!token) {
                token = prompt("Введите GitHub токен для записи:");
                if (!token) return "Токен не введён.";
                sessionStorage.setItem('gh_token', token);
            }
            const repo = "ohuettipidor-dev/rrr";
            const apiUrl = `https://api.github.com/repos/${repo}/contents/${filename}`;
            try {
                let sha = null;
                const getRes = await fetch(apiUrl, { headers: { "Authorization": `token ${token}` } });
                if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
                const body = {
                    message: `Агент: запись ${filename}`,
                    content: btoa(unescape(encodeURIComponent(content))),
                    ...(sha ? { sha } : {})
                };
                const putRes = await fetch(apiUrl, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                if (putRes.ok) return `Файл ${filename} успешно записан.`;
                else { const e = await putRes.json(); return "Ошибка: " + e.message; }
            } catch (e) { return "Ошибка: " + e.message; }
        }

        const TOOLS = { search_wikipedia, run_code, write_file };

        // Функция вызова LLM
        async function ask_llm(messages) {
            const r = await fetch(LLM_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model: "gpt-4o-mini", messages, temperature: 0.3, max_tokens: 200 })
            });
            const d = await r.json();
            return d.choices?.[0]?.message?.content;
        }

        // Главный цикл агента
        async function run_agent(user_prompt) {
            const messages = [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: user_prompt }
            ];
            for (let i = 0; i < 5; i++) {
                const response = await ask_llm(messages);
                if (!response) return "LLM не отвечает.";
                try {
                    const action = JSON.parse(response);
                    if (action.action === "final") return action.answer;
                    if (action.action === "tool" && TOOLS[action.tool]) {
                        const result = await TOOLS[action.tool](...(Object.values(action.args || {})));
                        messages.push({ role: "assistant", content: response });
                        messages.push({ role: "user", content: `Результат ${action.tool}: ${result}` });
                    } else return response;
                } catch (e) { return response; }
            }
            return "Достигнут лимит итераций.";
        }

        async function run() {
            const prompt = document.getElementById("prompt").value;
            document.getElementById("output").textContent = "Выполняю...";
            const answer = await run_agent(prompt);
            document.getElementById("output").textContent = answer;
        }
    </script>
</body>
</html>
