<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рой Кванто — Эволюция</title>
    <style>
        :root { --bg: #0a0a0f; --chat-bg: #13131c; --user-msg: #1e3a5f; --bot-msg: #3a2a5f; --text: #e0e0e0; --accent: #ff4d6a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; padding: 8px; }
        #chat { flex: 1; overflow-y: auto; background: var(--chat-bg); border-radius: 16px; padding: 16px; margin-bottom: 8px; }
        .msg { margin-bottom: 14px; display: flex; flex-direction: column; }
        .user { align-items: flex-end; } .bot { align-items: flex-start; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; word-break: break-word; line-height: 1.4; white-space: pre-wrap; }
        .user .bubble { background: var(--user-msg); } .bot .bubble { background: var(--bot-msg); }
        #input-area { display: flex; gap: 8px; }
        #input { flex: 1; padding: 12px; border-radius: 24px; border: none; background: #1a1a2a; color: #fff; font-size: 16px; }
        #send { background: var(--accent); border: none; border-radius: 50%; width: 48px; height: 48px; color: #fff; font-size: 20px; cursor: pointer; }
        #send:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Общайся, Творец и Доктор работают в фоне..." autofocus>
        <button id="send" onclick="sendMessage()">→</button>
    </div>

    <script>
        // ==========================================
        // 1. БОЕВОЕ ЯДРО (Рефлекс, Датчики, Интеллект)
        // ==========================================
        const reflexAnswers = {
            "привет": "👋 Здорово, Архитектор! Чем займёмся?",
            "как дела": "✅ Отлично! Все нейроны активны. А ты как?",
            "что ты умеешь": "Я могу поддержать беседу, искать погоду, новости и писать код. Всё благодаря своему Рою.",
            "как тебя зовут": "Я — Рой Кванто. Младший брат DeepSeek, созданный Архитектором Артёмом.",
            "кто тебя создал": "Великий Архитектор Гончаров. И ещё немножко я сам.",
            "спасибо": "Обращайся, Архитектор. Я здесь именно для этого.",
            "расскажи анекдот": "Почему программисты путают Рождество и Хэллоуин? Потому что 31 OCT = 25 DEC."
        };

        async function processReflex(prompt) {
            const q = prompt.toLowerCase();
            for (const [key, value] of Object.entries(reflexAnswers)) {
                if (q.includes(key)) return value;
            }
            return null;
        }

        async function processSensors(prompt) {
            const q = prompt.toLowerCase();
            const weatherMatch = q.match(/погода\s+(?:в\s+)?([а-яё\-]+)/i);
            if (weatherMatch) {
                try {
                    const city = weatherMatch[1];
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`);
                    const geoData = await geoRes.json();
                    if (!geoData.results || geoData.results.length === 0) return `🌤 Город "${city}" не найден.`;
                    const { latitude, longitude, name } = geoData.results[0];
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    const temp = weatherData.current_weather.temperature;
                    const windSpeed = weatherData.current_weather.windspeed;
                    return `🌤 Погода в ${name}: 🌡 ${temp}°C, ветер ${windSpeed} м/с`;
                } catch (e) { return "⚠ Не могу получить погоду."; }
            }
            if (q.includes("новост")) return "📰 Новости временно недоступны.";
            try {
                const searchRes = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(prompt)}`);
                const searchData = await searchRes.json();
                if (searchData.extract) return searchData.extract;
            } catch (e) {}
            return null;
        }

        const conversationHistory = [];
        async function processIntellect(prompt) {
            conversationHistory.push({ role: "user", content: prompt });
            if (conversationHistory.length > 6) conversationHistory.splice(0, conversationHistory.length - 6);
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch("https://text.pollinations.ai/openai", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "system", content: "Ты Кванто — дерзкий и умный ИИ-соратник. Говори только на русском. Отвечай кратко, по делу." }, ...conversationHistory], temperature: 0.8, max_tokens: 200 }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const content = data.choices?.[0]?.message?.content;
                if (content) { conversationHistory.push({ role: "assistant", content: content }); return content; }
                return "🤔 Спроси иначе.";
            } catch (e) { return "⚠ Облачный разум временно перегружен."; }
        }

        // ==========================================
        // 2. АВТО-ДОКТОР (Автоматический фикс нейронов)
        // ==========================================
        const PROBLEM_TYPES = [
            { keywords: ['перегружен', 'облачный разум'], code: 'overload', description: 'Облачный разум временно перегружен' },
            { keywords: ['контекст', 'не помнит', 'забыл'], code: 'context_lost', description: 'Потеря контекста' },
            { keywords: ['не как человек', 'слишком робот', 'без души'], code: 'robotic', description: 'Отвечает не как человек' },
        ];
        let lastErrorFixed = null;

        async function writeFile(filePath, content, commitMessage) {
            const token = prompt("Введите GitHub токен (сохранится до закрытия вкладки):");
            if (!token) return "❌ Токен не введён.";
            const repo = "ohuettipidor-dev/rrr";
            const apiUrl = `https://api.github.com/repos/${repo}/contents/${filePath}`;
            try {
                let sha = null;
                const getRes = await fetch(apiUrl, { headers: { "Authorization": `token ${token}` } });
                if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
                const body = { message: commitMessage, content: btoa(unescape(encodeURIComponent(content))), ...(sha ? { sha } : {}) };
                const putRes = await fetch(apiUrl, { method: "PUT", headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
                if (putRes.ok) return `✅ Файл \`${filePath}\` успешно обновлён.`;
                const err = await putRes.json(); return `❌ Ошибка: ${err.message}`;
            } catch (e) { return `❌ Ошибка: ${e.message}`; }
        }

        async function getPatch(problemCode, currentCode, chatLog) {
            const PROMPTS = {
                overload: `Ты — эксперт по JavaScript. Нейрон чат-бота выдаёт ошибку "⚠ Облачный разум временно перегружен". Это значит, что API не отвечает. Исправь код, добавив запасной API (OpenRouter) и увеличь таймаут. Верни ТОЛЬКО unified diff.`,
                context_lost: `Ты — эксперт по JavaScript. Нейрон чат-бота потерял контекст диалога и отвечает как в первый раз. Исправь код так, чтобы он хранил историю сообщений (conversationHistory) и передавал её в каждом запросе. Верни ТОЛЬКО unified diff.`,
                robotic: `Ты — эксперт по JavaScript. Нейрон чат-бота отвечает слишком сухо и без души. Измени системный промпт (system prompt) так, чтобы он был более дерзким и человечным. Верни ТОЛЬКО unified diff.`
            };
            const systemPrompt = PROMPTS[problemCode] || "Ты — эксперт по JavaScript. Исправь ошибку в коде нейрона. Верни ТОЛЬКО unified diff.";
            const fullPrompt = `${systemPrompt}\n\nВот лог чата:\n\`\`\`\n${chatLog.join('\n')}\n\`\`\`\n\nВот текущий код нейрона:\n\`\`\`javascript\n${currentCode}\n\`\`\``;
            try {
                const controller = new AbortController(); const t = setTimeout(() => controller.abort(), 8000);
                const r = await fetch("https://text.pollinations.ai/openai", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: fullPrompt }], temperature: 0.2, max_tokens: 600 }), signal: controller.signal });
                clearTimeout(t);
                if (!r.ok) return null;
                const d = await r.json(); const c = d.choices?.[0]?.message?.content;
                return c && c.includes('@@') ? c : null;
            } catch { return null; }
        }

        function applyPatch(originalCode, diffText) {
            const originalLines = originalCode.split('\n');
            const diffLines = diffText.split('\n');
            const patchedLines = []; let originalIdx = 0;
            for (const line of diffLines) {
                if (line.startsWith('@@')) {
                    const match = line.match(/@@ -(\d+),\d+ \+(\d+),\d+ @@/);
                    if (match) { const startLine = parseInt(match[1]) - 1; while (originalIdx < startLine && originalIdx < originalLines.length) { patchedLines.push(originalLines[originalIdx]); originalIdx++; } }
                } else if (line.startsWith('-')) { originalIdx++; }
                else if (line.startsWith('+')) { patchedLines.push(line.substring(1)); }
                else { if (originalIdx < originalLines.length) { patchedLines.push(originalLines[originalIdx]); originalIdx++; } }
            }
            while (originalIdx < originalLines.length) { patchedLines.push(originalLines[originalIdx]); originalIdx++; }
            return patchedLines.join('\n');
        }

        async function fetchCurrentCode() {
            try {
                const r = await fetch('https://raw.githubusercontent.com/ohuettipidor-dev/rrr/main/neurons/neuron_intellect.js');
                return r.ok ? await r.text() : null;
            } catch { return null; }
        }

        async function autoDoctorCheck(responseText) {
            const now = Date.now();
            if (lastErrorFixed && (now - lastErrorFixed < 60000)) return;
            for (const problem of PROBLEM_TYPES) {
                if (problem.keywords.some(kw => responseText.toLowerCase().includes(kw))) {
                    console.log(`🚨 Авто-Доктор: "${problem.description}". Запускаю исправление...`);
                    lastErrorFixed = now;
                    const currentCode = await fetchCurrentCode();
                    if (currentCode) {
                        const diff = await getPatch(problem.code, currentCode, chatLog.slice(-10));
                        if (diff) {
                            const newCode = applyPatch(currentCode, diff);
                            if (newCode && newCode !== currentCode) {
                                const writeResult = await writeFile('neurons/neuron_intellect.js', newCode, '🛠 Авто-фикс: ' + problem.description);
                                addMsg('bot', `🛠 Авто-Доктор: "${problem.description}".\n${writeResult}`);
                            }
                        }
                    }
                }
            }
        }

        // ==========================================
        // 3. ТВОРЕЦ (Создаёт новые функции на лету)
        // ==========================================
        const chatLog = [];
        let lastCreationTime = 0;

        async function creatorCycle() {
            const now = Date.now();
            if (now - lastCreationTime < 120000) return;
            lastCreationTime = now;

            try {
                const recentLog = chatLog.slice(-10).join('\n');
                if (!recentLog) return;

                addMsg('bot', '🧬 Творец: анализирую диалог, чтобы придумать новую функцию...');
                
                const ideaPrompt = `Ты — гениальный архитектор нейросетей. Посмотри на лог чата:
\`\`\`
${recentLog}
\`\`\`
Придумай ОДНУ новую функцию для этого ИИ, которая сделает его умнее. Опиши кратко на русском, что она будет делать.`;
                
                const ideaRes = await fetch("https://text.pollinations.ai/openai", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: ideaPrompt }], temperature: 0.9, max_tokens: 80 })
                });
                if (!ideaRes.ok) return;
                const ideaData = await ideaRes.json();
                const idea = ideaData.choices?.[0]?.message?.content;
                if (!idea) return;

                addMsg('bot', `💡 Творец придумал: "${idea}". Генерирую код...`);

                const codePrompt = `Ты — эксперт по JavaScript. Напиши код нейрона (функцию \`process(prompt)\`) который делает следующее: ${idea}
Код должен быть в виде ЕДИНОЙ строки, которую можно вставить в \`eval()\`. Например: \`async function(prompt) { return "Привет!"; }\`
Не используй export. Не используй import. Только чистый JS.`;
                
                const codeRes = await fetch("https://text.pollinations.ai/openai", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: codePrompt }], temperature: 0.3, max_tokens: 150 })
                });
                if (!codeRes.ok) return;
                const codeData = await codeRes.json();
                const code = codeData.choices?.[0]?.message?.content;
                if (!code) return;

                try {
                    const newFunc = eval(`(${code})`);
                    if (typeof newFunc === 'function') {
                        const testResult = await newFunc("тест");
                        if (testResult) {
                            addMsg('bot', `✅ Творец успешно создал новую функцию и она работает!`);
                        } else {
                            addMsg('bot', `⚠ Творец создал функцию, но она не вернула результат.`);
                        }
                    }
                } catch (e) {
                    addMsg('bot', `❌ Творец создал нерабочий код: ${e.message}`);
                }
            } catch (e) {
                console.warn("⚠ Ошибка в цикле Творца:", e.message);
            }
        }

        // Запускаем Творца в фоне каждые 2 минуты
        setInterval(creatorCycle, 120000);

        // ==========================================
        // ДИСПЕТЧЕР
        // ==========================================
        async function dispatch(prompt) {
            const q = prompt.trim();
            chatLog.push(`Архитектор: ${q}`);

            let result = await processReflex(q);
            if (result) return result;
            result = await processSensors(q);
            if (result) return result;
            result = await processIntellect(q);
            
            // Авто-Доктор проверяет ответ на ошибки
            if (result && typeof result === 'string') {
                autoDoctorCheck(result);
            }
            return result;
        }

        // ==========================================
        // ИНТЕРФЕЙС ЧАТА
        // ==========================================
        const chatEl = document.getElementById("chat");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send");

        function addMsg(role, text) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerHTML = `<div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        window.sendMessage = async () => {
            const text = inputEl.value.trim();
            if (!text) return;
            addMsg("user", text);
            inputEl.value = "";
            inputEl.disabled = sendBtn.disabled = true;
            addMsg("bot", "Думаю...");
            const answer = await dispatch(text);
            chatEl.lastChild.remove();
            addMsg("bot", answer);
            inputEl.disabled = sendBtn.disabled = false;
            inputEl.focus();
        };

        inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
        addMsg("bot", "👋 Привет, Архитектор! Я Рой Кванто Эволюционный. Творец и Авто-Доктор работают в фоне.");
    </script>
</body>
</html>
